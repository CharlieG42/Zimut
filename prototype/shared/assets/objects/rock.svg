<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Waven Style: Isometric rock -->
  
  <!-- Main rock body -->
  <polygon points="20,70 50,30 80,70 50,80" fill="#696969"/>
  <polygon points="25,75 50,35 75,75 50,85" fill="#4A4A4A"/>
  
  <!-- Left side -->
  <polygon points="20,70 50,30 50,70" fill="#808080"/>
  
  <!-- Right side -->
  <polygon points="50,70 80,70 50,80" fill="#505050"/>
  
  <!-- Highlights -->
  <polygon points="30,50 50,35 70,50 50,45" fill="#A9A9A9" fill-opacity="0.6"/>
  
  <!-- Shadow -->
  <polygon points="30,80 50,90 70,80 50,75" fill="#2F2F2F" fill-opacity="0.5"/>
  
  <!-- Texture details -->
  <polygon points="35,45 45,40 55,45 50,50" fill="#708090" opacity="0.7"/>
  <polygon points="45,55 55,50 65,55 60,60" fill="#708090" opacity="0.7"/>
</svg>