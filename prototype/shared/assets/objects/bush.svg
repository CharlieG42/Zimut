<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Waven Style: Isometric bush -->
  
  <!-- Main bush body -->
  <polygon points="25,65 50,35 75,65 50,75" fill="#228B22"/>
  <polygon points="30,70 50,40 70,70 50,80" fill="#32CD32"/>
  
  <!-- Left side -->
  <polygon points="25,65 50,35 50,65" fill="#90EE90"/>
  
  <!-- Right side -->
  <polygon points="50,65 75,65 50,75" fill="#006400"/>
  
  <!-- Highlights -->
  <polygon points="35,55 50,45 65,55 50,50" fill="#ADFF2F" fill-opacity="0.5"/>
  
  <!-- Shadow -->
  <polygon points="30,75 50,85 70,75 50,70" fill="#2F4F4F" fill-opacity="0.4"/>
  
  <!-- Leaf details -->
  <ellipse cx="40" cy="50" rx="8" ry="5" fill="#32CD32" opacity="0.8"/>
  <ellipse cx="60" cy="55" rx="6" ry="4" fill="#90EE90" opacity="0.8"/>
  <ellipse cx="35" cy="65" rx="5" ry="3" fill="#006400" opacity="0.8"/>
  <ellipse cx="65" cy="60" rx="7" ry="4" fill="#228B22" opacity="0.8"/>
</svg>