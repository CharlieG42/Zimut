<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110" width="80" height="110">
  <defs>
    <radialGradient id="aShadow" cx="50%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#CC2244"/>
      <stop offset="50%"  stop-color="#880022"/>
      <stop offset="100%" stop-color="#440011"/>
    </linearGradient>
    <linearGradient id="aHood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#331122"/>
      <stop offset="100%" stop-color="#110008"/>
    </linearGradient>
    <linearGradient id="aBlade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E0E8F0"/>
      <stop offset="40%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8899AA"/>
    </linearGradient>
    <radialGradient id="aEye" cx="30%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FF6688"/>
      <stop offset="100%" stop-color="#CC0033"/>
    </radialGradient>
    <filter id="aBlur"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="aGlow"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <!-- Ombre sol -->
  <ellipse cx="40" cy="107" rx="18" ry="4" fill="url(#aShadow)"/>

  <!-- Halo de classe (rouge) -->
  <ellipse cx="40" cy="96" rx="20" ry="6" fill="#880022" opacity="0.4" filter="url(#aBlur)"/>

  <!-- Cape — arrière -->
  <path d="M16,40 Q8,60 10,90 Q20,95 40,94 Q60,95 70,90 Q72,60 64,40 Q52,48 40,46 Q28,48 16,40 Z"
        fill="#220011" opacity="0.95"/>
  <!-- Reflet cape -->
  <path d="M18,42 Q12,62 14,86 Q24,90 38,90" fill="none" stroke="#441122" stroke-width="2.5"/>

  <!-- Jambes -->
  <rect x="29" y="74" width="9" height="20" rx="3" fill="#330011"/>
  <rect x="42" y="74" width="9" height="20" rx="3" fill="#330011"/>
  <!-- Bottes -->
  <ellipse cx="33" cy="93" rx="7" ry="4" fill="#1A0008"/>
  <ellipse cx="47" cy="93" rx="7" ry="4" fill="#1A0008"/>
  <!-- Liseré botte -->
  <path d="M27,90 Q33,86 40,90" fill="none" stroke="#CC2244" stroke-width="1.2"/>
  <path d="M40,90 Q47,86 53,90" fill="none" stroke="#CC2244" stroke-width="1.2"/>

  <!-- Torse -->
  <path d="M24,42 Q24,36 40,34 Q56,36 56,42 L54,74 Q40,78 26,74 Z" fill="url(#aBody)"/>
  <!-- Ceinture avec pochettes -->
  <rect x="25" y="66" width="30" height="8" rx="2" fill="#1A0008"/>
  <rect x="28" y="67" width="6" height="6" rx="1" fill="#440011"/>
  <rect x="46" y="67" width="6" height="6" rx="1" fill="#440011"/>
  <!-- Croisillons sur torse -->
  <line x1="28" y1="42" x2="52" y2="70" stroke="#CC2244" stroke-width="1.5" opacity="0.4"/>
  <line x1="52" y1="42" x2="28" y2="70" stroke="#CC2244" stroke-width="1.5" opacity="0.4"/>

  <!-- Bras gauche + lame -->
  <path d="M18,42 Q14,48 14,62 L22,68 Q26,66 28,60 L28,42 Z" fill="#880022"/>
  <!-- Lame gauche (dague) -->
  <path d="M8,34 L14,26 L18,30 L12,58 L8,58 Z" fill="url(#aBlade)"/>
  <path d="M10,35 L14,28 L17,31" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.7"/>
  <!-- Garde dague gauche -->
  <rect x="6" y="54" width="12" height="4" rx="2" fill="#CC2244"/>

  <!-- Bras droit + lame -->
  <path d="M52,42 Q60,46 64,58 L58,66 Q54,66 52,60 L52,42 Z" fill="#880022"/>
  <!-- Lame droite -->
  <path d="M72,34 L66,26 L62,30 L68,58 L72,58 Z" fill="url(#aBlade)"/>
  <path d="M70,35 L66,28 L63,31" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.7"/>
  <!-- Garde dague droite -->
  <rect x="62" y="54" width="12" height="4" rx="2" fill="#CC2244"/>

  <!-- Épaulières -->
  <ellipse cx="22" cy="42" rx="8" ry="6" fill="#CC2244"/>
  <ellipse cx="58" cy="42" rx="8" ry="6" fill="#CC2244"/>
  <!-- Piques épaulières -->
  <polygon points="22,34 19,42 25,42" fill="#FF4466"/>
  <polygon points="58,34 55,42 61,42" fill="#FF4466"/>

  <!-- Capuche -->
  <path d="M18,28 Q18,6 40,4 Q62,6 62,28 L58,36 Q40,40 22,36 Z" fill="url(#aHood)"/>
  <!-- Ombre intérieure capuche -->
  <path d="M24,26 Q24,10 40,8 Q56,10 56,26 L52,32 Q40,34 28,32 Z" fill="#000" opacity="0.6"/>
  <!-- Masque -->
  <path d="M26,24 Q26,18 40,16 Q54,18 54,24 L52,30 Q40,32 28,30 Z" fill="#220011" opacity="0.9"/>
  <!-- Yeux rouges lumineux -->
  <ellipse cx="33" cy="25" rx="4" ry="3" fill="url(#aEye)"/>
  <ellipse cx="47" cy="25" rx="4" ry="3" fill="url(#aEye)"/>
  <!-- Pupilles -->
  <ellipse cx="33" cy="25" rx="1.5" ry="2" fill="#000"/>
  <ellipse cx="47" cy="25" rx="1.5" ry="2" fill="#000"/>
  <!-- Glow yeux -->
  <ellipse cx="33" cy="25" rx="5" ry="4" fill="#FF2244" opacity="0.3" filter="url(#aGlow)"/>
  <ellipse cx="47" cy="25" rx="5" ry="4" fill="#FF2244" opacity="0.3" filter="url(#aGlow)"/>

  <!-- Particules d'énergie sombre -->
  <circle cx="16" cy="36" r="2" fill="#FF4466" opacity="0.7"/>
  <circle cx="64" cy="36" r="2" fill="#FF4466" opacity="0.7"/>
  <circle cx="20" cy="52" r="1.5" fill="#CC2244" opacity="0.5"/>
  <circle cx="60" cy="52" r="1.5" fill="#CC2244" opacity="0.5"/>
</svg>
