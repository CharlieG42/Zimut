<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Waven Style: Warm brown tones, isometric diamond -->
  
  <!-- Main diamond face - Warm brown base -->
  <polygon points="0,50 50,0 100,50 50,100" fill="#8B4513"/>
  
  <!-- Left side face - Darker brown -->
  <polygon points="0,50 50,0 50,50" fill="#654321"/>
  
  <!-- Right side face - Lighter brown -->
  <polygon points="50,50 100,50 50,100" fill="#A0522D"/>
  
  <!-- Top highlight - Warm orange highlight -->
  <polygon points="15,45 50,5 85,45 50,35" fill="#CD853F" fill-opacity="0.5"/>
  
  <!-- Bottom shadow -->
  <polygon points="15,55 50,95 85,55 50,65" fill="#4A2C2A" fill-opacity="0.4"/>
  
  <!-- Dirt texture details -->
  <ellipse cx="25" cy="35" rx="4" ry="2" fill="#A0522D" opacity="0.7"/>
  <ellipse cx="45" cy="40" rx="3" ry="1.5" fill="#A0522D" opacity="0.7"/>
  <ellipse cx="75" cy="30" rx="5" ry="2.5" fill="#A0522D" opacity="0.7"/>
  <ellipse cx="35" cy="65" rx="3.5" ry="2" fill="#A0522D" opacity="0.7"/>
  <ellipse cx="65" cy="70" rx="4" ry="2" fill="#A0522D" opacity="0.7"/>
  
  <!-- Border highlight (Waven style) -->
  <polygon points="0,50 50,0 100,50 50,100" fill="none" stroke="#FFD700" stroke-width="1" stroke-opacity="0.6"/>
</svg>