<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Waven Style: Warm gray tones, isometric diamond -->
  
  <!-- Main diamond face - Warm gray base -->
  <polygon points="0,50 50,0 100,50 50,100" fill="#696969"/>
  
  <!-- Left side face - Darker gray -->
  <polygon points="0,50 50,0 50,50" fill="#4A4A4A"/>
  
  <!-- Right side face - Lighter gray -->
  <polygon points="50,50 100,50 50,100" fill="#808080"/>
  
  <!-- Top highlight - Light highlight -->
  <polygon points="15,45 50,5 85,45 50,35" fill="#A9A9A9" fill-opacity="0.6"/>
  
  <!-- Bottom shadow -->
  <polygon points="15,55 50,95 85,55 50,65" fill="#2F2F2F" fill-opacity="0.5"/>
  
  <!-- Stone texture details -->
  <polygon points="15,25 25,20 30,25 25,30" fill="#708090" opacity="0.8"/>
  <polygon points="40,15 50,10 60,15 55,20" fill="#708090" opacity="0.8"/>
  <polygon points="65,20 75,15 85,20 80,25" fill="#708090" opacity="0.8"/>
  <polygon points="20,55 30,50 35,55 30,60" fill="#708090" opacity="0.8"/>
  <polygon points="50,55 60,50 65,55 60,60" fill="#708090" opacity="0.8"/>
  <polygon points="75,60 85,55 90,60 85,65" fill="#708090" opacity="0.8"/>
  
  <!-- Border highlight (Waven style) -->
  <polygon points="0,50 50,0 100,50 50,100" fill="none" stroke="#FFD700" stroke-width="1" stroke-opacity="0.6"/>
</svg>