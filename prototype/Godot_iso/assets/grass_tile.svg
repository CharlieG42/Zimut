<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Waven Style: Warm tones, isometric diamond with side faces -->
  
  <!-- Main diamond face (top) - Warm green base -->
  <polygon points="0,50 50,0 100,50 50,100" fill="#6B8E23"/>
  
  <!-- Left side face - Darker green for 3D effect -->
  <polygon points="0,50 50,0 50,50" fill="#556B2F"/>
  
  <!-- Right side face - Medium green -->
  <polygon points="50,50 100,50 50,100" fill="#8FBC8F"/>
  
  <!-- Top highlight - Light warm highlight -->
  <polygon points="15,45 50,5 85,45 50,35" fill="#ADFF2F" fill-opacity="0.4"/>
  
  <!-- Bottom shadow -->
  <polygon points="15,55 50,95 85,55 50,65" fill="#2E8B57" fill-opacity="0.3"/>
  
  <!-- Grass texture details -->
  <path d="M20,30 Q30,20 40,30" stroke="#3CB371" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M60,35 Q70,25 80,35" stroke="#3CB371" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30,60 Q40,50 50,60" stroke="#3CB371" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M70,65 Q80,55 90,65" stroke="#3CB371" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Border highlight (Waven style) -->
  <polygon points="0,50 50,0 100,50 50,100" fill="none" stroke="#FFD700" stroke-width="1" stroke-opacity="0.6"/>
</svg>