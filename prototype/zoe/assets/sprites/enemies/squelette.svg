<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Skull -->
  <circle cx="50" cy="25" r="12" fill="#FFFFFF" stroke="#808080" stroke-width="1"/>
  
  <!-- Eye sockets -->
  <ellipse cx="45" cy="23" rx="3" ry="4" fill="#000000"/>
  <ellipse cx="55" cy="23" rx="3" ry="4" fill="#000000"/>
  
  <!-- Nose hole -->
  <ellipse cx="50" cy="28" rx="2" ry="3" fill="#000000"/>
  
  <!-- Jaw -->
  <path d="M40,32 Q50,38 60,32" stroke="#FFFFFF" stroke-width="2" fill="none"/>
  
  <!-- Rib cage -->
  <ellipse cx="50" cy="45" rx="15" ry="10" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M45,45 L55,45" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M45,50 L55,50" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M45,55 L55,55" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Arms -->
  <path d="M30,35 L20,25" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M70,35 L80,25" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Legs -->
  <path d="M45,60 L40,80" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <path d="M55,60 L60,80" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Sword -->
  <path d="M20,25 L15,15 L10,30" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round"/>
</svg>